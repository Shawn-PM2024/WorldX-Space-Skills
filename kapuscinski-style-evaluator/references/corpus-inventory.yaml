meta:
  project: kapuscinski-style-evaluator
  author: Ryszard Kapuscinski
  purpose: >
    Build a multilingual corpus inventory for a writing-coach-style evaluator
    that judges whether a text resembles Kapuscinski's writing tendencies,
    then explains why and offers revision advice without directly imitating
    the author's style.
  updated_at: 2026-04-07
  policy:
    acquisition_scope: legal_ebooks_and_user_owned_copies_only
    no_unlicensed_downloads: true
    note: >
      This file records metadata and acquisition targets only. It does not
      contain copyrighted full text.

collection_plan:
  tier_1_goal:
    - Polish originals: at least 4 books
    - English translations: at least 4 books
    - Chinese translations: at least 2 books
  tier_2_goal:
    - One Romance-language track: Spanish or French or Italian, at least 2 books
    - Supplementary prose/reportage titles to avoid overfitting to one tone
  recommended_storage_layers:
    - canonical_positive
    - derived_positive
    - critical_secondary
    - negative_controls

