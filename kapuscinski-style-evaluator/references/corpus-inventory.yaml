acquisition_queue:
  immediate:
    - cesarz.pl
    - cesarz.en
    - szachinszach.pl
    - szachinszach.en
    - imperium.en
    - heban.pl
    - heban.en
    - podroze-z-herodotem.pl
    - podroze-z-herodotem.en
    - podroze-z-herodotem.zh-Hans
  next_wave:
    - another-day-of-life.en
    - the-soccer-war.en
    - heban.es
    - podroze-z-herodotem.es
    - szachinszach.it
  fallback_paths:
    - Buy paper editions and create a user-owned OCR workflow with manual correction.
    - Add library scans only if the user has access and rights to process them.
    - Keep sample-only Chinese editions out of the main training/reference set.

annotation_notes:
  why_multilingual: >
    The evaluator should judge both Chinese and English user text, but the
    reference corpus should include the Polish originals so we do not mistake a
    translator's habits for the author's style.
  what_not_to_do:
    - Do not use this corpus to generate close imitations of copyrighted style.
    - Do not treat one translated book as the whole style.
    - Do not mix reviews, blurbs, and secondary criticism into canonical prose.
  likely_future_fields:
    - excerpt_rights_status
    - local_file_path
    - purchase_owner
    - text_extraction_status
    - normalization_status
    - segmentation_status
